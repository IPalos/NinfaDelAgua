<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0B1D33">
  <title>Turn Counter</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="app">
    <section class="bar-panel" aria-label="Turn progress">
      <div class="bar-labels" id="bar-labels"></div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-fill"></div>
      </div>
    </section>

    <section class="controls" aria-label="Game controls">
      <p class="turn-display" id="turn-display" aria-live="polite">40</p>

      <button type="button" class="btn btn-round btn-plus" id="btn-plus" aria-label="Add one turn">
        <span class="arrow" aria-hidden="true">&#9650;</span>
      </button>

      <button type="button" class="btn btn-round btn-minus" id="btn-minus" aria-label="Subtract one turn">
        <span class="arrow" aria-hidden="true">&#9660;</span>
      </button>

      <button type="button" class="btn btn-round btn-mute" id="btn-mute" aria-label="Mute" aria-pressed="false">
        <span class="mute-icon" aria-hidden="true">&#128266;</span>
      </button>

      <button type="button" class="btn btn-reset" id="btn-reset">Reset</button>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
